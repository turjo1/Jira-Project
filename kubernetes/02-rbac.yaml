apiVersion: v1
kind: ServiceAccount
metadata:
  name: jira-analytics
  namespace: jira-analytics
  labels:
    app: jira-analytics
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jira-analytics
  labels:
    app: jira-analytics
rules:
  # Allow reading pods in own namespace
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Allow reading configmaps and secrets in own namespace
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  # Allow reading services (for DNS discovery)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  # Allow reading endpoints for service discovery
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jira-analytics
  labels:
    app: jira-analytics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jira-analytics
subjects:
  - kind: ServiceAccount
    name: jira-analytics
    namespace: jira-analytics
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jira-analytics-local
  namespace: jira-analytics
  labels:
    app: jira-analytics
rules:
  # Allow leader election for Celery Beat
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "watch", "update", "patch"]
  # Allow lease-based leader election (Kubernetes native)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jira-analytics-local
  namespace: jira-analytics
  labels:
    app: jira-analytics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jira-analytics-local
subjects:
  - kind: ServiceAccount
    name: jira-analytics
    namespace: jira-analytics
