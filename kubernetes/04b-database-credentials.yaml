# This file creates the database connection string secret
# The actual password values come from the mysql-credentials secret
#
# To generate the connection string:
#   DATABASE_URL=mysql+pymysql://jira:PASSWORD@mysql:3306/jira_analytics
#
# Convert to base64: echo -n "mysql+pymysql://jira:PASSWORD@mysql:3306/jira_analytics" | base64

apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: jira-analytics
  labels:
    app: jira-analytics
    component: database
type: Opaque
data:
  # Replace BASE64_ENCODED_CONNECTION_STRING with actual base64-encoded connection string
  # Example (base64 decoded):
  #   mysql+pymysql://jira:PASSWORD@mysql:3306/jira_analytics
  connection-string: bXlzcWwrcHlteXNxbDovL2ppcmE6UEFTU1dPUkRAbXlzcWw6MzMwNi9qaXJhX2FuYWx5dGljcw==
