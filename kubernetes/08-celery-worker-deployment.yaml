apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: jira-analytics
  labels:
    app: jira-analytics
    component: celery-worker
  annotations:
    description: "Celery worker processes background jobs (async Jira sync, etc)"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: jira-analytics
      component: celery-worker
  template:
    metadata:
      labels:
        app: jira-analytics
        component: celery-worker
    spec:
      serviceAccountName: jira-analytics
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: celery-worker
          image: docker.io/YOUR_DOCKER_USERNAME/jira-analytics-backend:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.tasks
            - worker
            - --loglevel=info
            - --concurrency=4
            - --max-tasks-per-child=100
            - --time-limit=3600
            - --soft-time-limit=3000

          env:
            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: connection-string
            - name: DATABASE_POOL_SIZE
              valueFrom:
                configMapKeyRef:
                  name: jira-analytics-config
                  key: DATABASE_POOL_SIZE
            - name: DATABASE_MAX_OVERFLOW
              valueFrom:
                configMapKeyRef:
                  name: jira-analytics-config
                  key: DATABASE_MAX_OVERFLOW

            # Redis/Celery
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: jira-analytics-config
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: jira-analytics-config
                  key: CELERY_RESULT_BACKEND
            - name: CELERY_TIMEZONE
              valueFrom:
                configMapKeyRef:
                  name: jira-analytics-config
                  key: CELERY_TIMEZONE

            # Jira OAuth
            - name: JIRA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: jira-oauth-credentials
                  key: client-id
            - name: JIRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jira-oauth-credentials
                  key: client-secret
            - name: JIRA_API_URL
              valueFrom:
                configMapKeyRef:
                  name: jira-analytics-config
                  key: JIRA_API_URL

            # Application
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: jira-analytics-config
                  key: LOG_LEVEL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: jira-analytics-config
                  key: ENVIRONMENT

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          # No HTTP probes; Celery doesn't expose HTTP endpoints
          # Liveness check via process monitoring
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A app.tasks inspect ping | grep -q celery@
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

      volumes:
        - name: tmp
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - jira-analytics
                    - key: component
                      operator: In
                      values:
                        - celery-worker
                topologyKey: kubernetes.io/hostname
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: celery-worker-pdb
  namespace: jira-analytics
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: jira-analytics
      component: celery-worker
