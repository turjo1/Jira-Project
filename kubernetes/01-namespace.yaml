apiVersion: v1
kind: Namespace
metadata:
  name: jira-analytics
  labels:
    app: jira-analytics
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: jira-analytics-quota
  namespace: jira-analytics
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    pods: "50"
    services: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: jira-analytics-limits
  namespace: jira-analytics
spec:
  limits:
    - type: Container
      max:
        cpu: "1000m"
        memory: "1Gi"
      min:
        cpu: "10m"
        memory: "32Mi"
      default:
        cpu: "100m"
        memory: "256Mi"
      defaultRequest:
        cpu: "50m"
        memory: "128Mi"
    - type: Pod
      max:
        cpu: "2000m"
        memory: "2Gi"
      min:
        cpu: "20m"
        memory: "64Mi"
