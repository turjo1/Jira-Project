apiVersion: v1
kind: ConfigMap
metadata:
  name: jira-analytics-config
  namespace: jira-analytics
  labels:
    app: jira-analytics
    component: config
data:
  # FastAPI & Backend Configuration
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  DEBUG: "false"

  # API Configuration
  API_WORKERS: "4"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"

  # Database Configuration (connection pooling)
  DATABASE_POOL_SIZE: "10"
  DATABASE_MAX_OVERFLOW: "20"
  DATABASE_POOL_RECYCLE: "3600"
  DATABASE_ECHO: "false"

  # Redis Configuration
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Celery Configuration
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"
  CELERY_TIMEZONE: "UTC"
  CELERY_TASK_SERIALIZER: "json"
  CELERY_RESULT_SERIALIZER: "json"

  # Celery Beat Schedule (5-minute sync)
  SYNC_INTERVAL_MINUTES: "5"

  # JWT Configuration
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "24"
  JWT_REFRESH_EXPIRATION_DAYS: "7"

  # Jira Configuration (override in secrets for production)
  JIRA_API_URL: "https://your-instance.atlassian.net/rest/api/3"
  JIRA_OAUTH_AUTHORIZE_URL: "https://auth.atlassian.com/authorize"
  JIRA_OAUTH_TOKEN_URL: "https://auth.atlassian.com/oauth/token"

  # CORS Configuration
  CORS_ORIGINS: "https://jira-analytics.example.com"
  CORS_ALLOW_CREDENTIALS: "true"

  # Frontend Configuration
  API_BASE_URL: "https://api.jira-analytics.example.com"
  FRONTEND_PORT: "8080"

  # Metrics & Monitoring
  PROMETHEUS_METRICS_PORT: "8001"
  ENABLE_METRICS: "true"

  # Logging
  LOG_FORMAT: "json"
  LOG_HANDLERS: "console,file"

  # Health Check
  HEALTH_CHECK_INTERVAL: "30"
  READINESS_CHECK_TIMEOUT: "10"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-config
  namespace: jira-analytics
  labels:
    app: jira-analytics
    component: database
data:
  my.cnf: |
    [mysqld]
    # InnoDB Settings
    default-storage-engine = InnoDB
    innodb_buffer_pool_size = 256M
    innodb_log_file_size = 100M

    # Connection Settings
    max_connections = 100
    wait_timeout = 28800

    # Query Settings
    max_allowed_packet = 256M
    query_cache_size = 0
    query_cache_type = 0

    # Character Set
    character_set_server = utf8mb4
    collation_server = utf8mb4_unicode_ci

    # Replication/Binary Logging
    log_bin = mysql-bin
    binlog_format = ROW
    binlog_retention_days = 7

    # Slow Query Logging
    slow_query_log = 1
    slow_query_log_file = /var/log/mysql/slow.log
    long_query_time = 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: jira-analytics
  labels:
    app: jira-analytics
    component: frontend
data:
  app.conf: |
    upstream api {
      server api:8000;
    }

    server {
      listen 8080;
      server_name _;

      client_max_body_size 10M;

      # Security headers
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;

      # Gzip compression
      gzip on;
      gzip_types text/plain text/css text/xml text/javascript
                 application/x-javascript application/xml+rss
                 application/json application/javascript;
      gzip_min_length 1000;
      gzip_comp_level 6;

      # Static files (React build output)
      root /usr/share/nginx/html;

      location / {
        # Serve static files
        try_files $uri /index.html;
      }

      # API proxy
      location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
      }

      # WebSocket support
      location /ws/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
      }

      # Health check endpoint
      location /healthz {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
      }
    }
