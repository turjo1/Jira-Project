name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME_BACKEND: jira-analytics-backend
  IMAGE_NAME_FRONTEND: jira-analytics-frontend

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
        node-version: ["20"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Python linting tools
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install black ruff

      - name: Run Black code formatter check
        working-directory: backend
        run: black --check app/ tests/ celery_*.py || true

      - name: Run Ruff linter
        working-directory: backend
        run: ruff check app/ tests/ celery_*.py || true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: frontend
        run: npm run typecheck

  test-backend:
    name: Backend Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: jira_analytics_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL: mysql+pymysql://testuser:testpass@127.0.0.1:3306/jira_analytics_test
        run: alembic upgrade head

      - name: Run pytest with coverage
        working-directory: backend
        env:
          DATABASE_URL: mysql+pymysql://testuser:testpass@127.0.0.1:3306/jira_analytics_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key
          JIRA_CLIENT_ID: test-client
          JIRA_CLIENT_SECRET: test-secret
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  test-frontend:
    name: Frontend Unit & Component Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run vitest with coverage
        working-directory: frontend
        run: npm run test:run -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - test-backend
      - test-frontend
    permissions:
      contents: read
      packages: write
    outputs:
      backend-image: ${{ steps.image-tag.outputs.backend }}
      frontend-image: ${{ steps.image-tag.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tags
        id: image-tag
        run: |
          COMMIT_SHA=${{ github.sha }}
          COMMIT_SHORT=${COMMIT_SHA:0:7}
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            BACKEND_TAG="${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_BACKEND }}:latest"
            BACKEND_TAG_SHA="${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_BACKEND }}:${COMMIT_SHORT}"
            FRONTEND_TAG="${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_FRONTEND }}:latest"
            FRONTEND_TAG_SHA="${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_FRONTEND }}:${COMMIT_SHORT}"
          else
            BACKEND_TAG="${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_BACKEND }}:${COMMIT_SHORT}-${TIMESTAMP}"
            FRONTEND_TAG="${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME_FRONTEND }}:${COMMIT_SHORT}-${TIMESTAMP}"
          fi

          echo "backend=${BACKEND_TAG}" >> $GITHUB_OUTPUT
          echo "frontend=${FRONTEND_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.image-tag.outputs.backend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.image-tag.outputs.frontend }}
          target: runtime
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs:
      - test-backend
      - test-frontend
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start services with Docker Compose
        run: docker-compose -f backend/docker-compose.yml up -d

      - name: Wait for services to be healthy
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done'
          timeout 60 bash -c 'until curl -f http://localhost:3000/index.html; do sleep 2; done'

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Stop services
        if: always()
        run: docker-compose -f backend/docker-compose.yml down

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-backend
      - test-frontend
      - build
    if: always()
    steps:
      - name: Check CI pipeline status
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.test-backend.result }}" == "failure" || \
                "${{ needs.test-frontend.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" ]]; then
            echo "CI Pipeline FAILED"
            exit 1
          fi
          echo "CI Pipeline PASSED"
